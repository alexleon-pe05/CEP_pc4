<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Control Estadístico - PC4</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: 'Inter', sans-serif; }

/* Animar el ángulo del borde luminoso (inspirado en shine-border de Cult UI) */
@property --beam-angle {
    syntax: '<angle>'; initial-value: 0deg; inherits: false;
}

body {
    background: url("imagenes/fondo/pexels-rdne-7948038.jpg") center center / cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
}
body::before {
    content: ''; position: absolute; inset: 0;
    background:
        radial-gradient(1200px 600px at 50% -10%, rgba(45, 127, 212, 0.25), transparent 60%),
        linear-gradient(180deg, rgba(5, 10, 25, 0.45), rgba(3, 7, 18, 0.72));
}

/* ---- Orbes de luz flotantes (estética moderna Cult UI) ---- */
.orb { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.4; pointer-events: none; }
.orb-1 { width: 340px; height: 340px; background: #2d7fd4; top: -90px; left: -70px; animation: floatOrb 14s ease-in-out infinite; }
.orb-2 { width: 300px; height: 300px; background: #4a9eff; bottom: -80px; right: -60px; animation: floatOrb 16s ease-in-out infinite reverse; }
.orb-3 { width: 240px; height: 240px; background: #1a3a6b; top: 40%; left: 60%; animation: floatOrb 18s ease-in-out infinite; }
@keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -40px) scale(1.1); }
}

.chart-line { position: absolute; opacity: 0.12; }
.chart-line svg { width: 100%; height: 100%; }
.cl1 { top: 10%; left: 5%; width: 280px; height: 140px; }
.cl2 { bottom: 15%; right: 8%; width: 320px; height: 160px; }
.cl3 { top: 50%; right: 3%; width: 200px; height: 100px; opacity: 0.08; }
.dots { position: absolute; width: 100%; height: 100%; }
.dot { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: #2d7fd4; opacity: 0.25; }

/* ---- Tarjeta con borde luminoso giratorio (shine-border) ---- */
.card {
    position: relative; z-index: 10;
    text-align: center;
    padding: 60px 48px;
    background: rgba(255, 255, 255, 0.045);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    box-shadow: 0 32px 64px rgba(0, 0, 0, 0.45);
    max-width: 540px; width: 90%;
    overflow: hidden;
}
/* Línea de luz que recorre el borde de la tarjeta */
.card::before {
    content: ''; position: absolute; inset: 0; border-radius: 24px; padding: 1.5px;
    background: conic-gradient(from var(--beam-angle),
        transparent 65%, rgba(74, 158, 255, 0.9), #ffffff, rgba(45, 127, 212, 0.9), transparent 100%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: spinBeam 6s linear infinite;
    pointer-events: none;
}
@keyframes spinBeam { to { --beam-angle: 360deg; } }
/* Brillo sutil en el borde superior (highlight de cristal) */
.card::after {
    content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    pointer-events: none;
}

/* ---- Entrada animada con stagger (text-animate / motion) ---- */
.reveal { opacity: 0; transform: translateY(26px); animation: revealUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.d1 { animation-delay: 0.10s; } .d2 { animation-delay: 0.22s; } .d3 { animation-delay: 0.34s; }
.d4 { animation-delay: 0.46s; } .d5 { animation-delay: 0.58s; } .d6 { animation-delay: 0.70s; }
@keyframes revealUp { to { opacity: 1; transform: translateY(0); } }

.logo-uni {
    position: relative; z-index: 1;
    width: 110px; height: 110px; border-radius: 50%;
    background: #ffffff;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 26px;
    padding: 10px;
    box-shadow:
        0 0 0 3px rgba(45, 127, 212, 0.4),
        0 0 0 6px rgba(45, 127, 212, 0.12),
        0 12px 36px rgba(0, 0, 0, 0.45);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.logo-uni:hover {
    transform: scale(1.05);
    box-shadow:
        0 0 0 3px rgba(45, 127, 212, 0.7),
        0 0 0 8px rgba(45, 127, 212, 0.2),
        0 16px 44px rgba(0, 0, 0, 0.55);
}
.logo-uni img { width: 88px; height: 88px; object-fit: contain; border-radius: 50%; }

/* Insignia superior */
.badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 14px; margin-bottom: 18px;
    background: rgba(45, 127, 212, 0.12);
    border: 1px solid rgba(74, 158, 255, 0.3);
    border-radius: 999px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    color: #9cc7f5; text-transform: uppercase;
}
.badge .pulse-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #4a9eff;
    box-shadow: 0 0 0 0 rgba(74, 158, 255, 0.7); animation: pulseDot 2s infinite;
}
@keyframes pulseDot {
    0% { box-shadow: 0 0 0 0 rgba(74, 158, 255, 0.6); }
    70% { box-shadow: 0 0 0 8px rgba(74, 158, 255, 0); }
    100% { box-shadow: 0 0 0 0 rgba(74, 158, 255, 0); }
}

/* ---- Título con degradado animado (gradient-heading) ---- */
h1 {
    font-size: 34px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em;
    background: linear-gradient(100deg, #ffffff 0%, #9cc7f5 25%, #2d7fd4 50%, #9cc7f5 75%, #ffffff 100%);
    background-size: 220% auto;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    animation: shineText 6s linear infinite;
}
@keyframes shineText { to { background-position: 220% center; } }
.subtitle {
    font-size: 15px; color: rgba(255, 255, 255, 0.55);
    margin-bottom: 28px; font-weight: 400;
}

/* ---- Fila de estadísticas con números que cuentan (animated-number) ---- */
.stats {
    display: flex; justify-content: center; gap: 0;
    margin-bottom: 34px;
}
.stat { flex: 1; padding: 0 8px; }
.stat + .stat { border-left: 1px solid rgba(255, 255, 255, 0.1); }
.stat-num {
    display: block; font-size: 30px; font-weight: 800; line-height: 1;
    color: #ffffff; letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
}
.stat-label {
    display: block; margin-top: 6px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.07em;
    color: rgba(255, 255, 255, 0.45); text-transform: uppercase;
}

/* ---- Botón con barrido de brillo (texture-button) ---- */
.btn-iniciar {
    position: relative; overflow: hidden;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 52px;
    background: linear-gradient(135deg, #2d7fd4 0%, #1a3a6b 100%);
    color: white; font-size: 18px; font-weight: 600;
    border: none; border-radius: 14px; cursor: pointer;
    text-decoration: none; transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 8px 24px rgba(45, 127, 212, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    letter-spacing: 0.02em;
}
.btn-iniciar::after {
    content: ''; position: absolute; top: 0; left: -150%;
    width: 60%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transform: skewX(-20deg); animation: sweep 3.5s ease-in-out infinite;
}
@keyframes sweep { 0%, 55% { left: -150%; } 100% { left: 160%; } }
.btn-iniciar:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 36px rgba(45, 127, 212, 0.6), inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn-iniciar:active { transform: translateY(0); }
.btn-iniciar span.arrow { display: inline-flex; transition: transform 0.3s ease; }
.btn-iniciar:hover span.arrow { transform: translateX(4px); }
.btn-iniciar svg { width: 20px; height: 20px; fill: currentColor; }

.footer-text {
    margin-top: 30px; font-size: 12px;
    color: rgba(255, 255, 255, 0.28); letter-spacing: 0.05em;
}
@keyframes pulse {
    0% { opacity: 0.1; transform: scale(0.8); }
    100% { opacity: 0.4; transform: scale(1.2); }
}
.chart-line { animation: float 8s ease-in-out infinite alternate; }
.cl1 { animation-delay: 0s; }
.cl2 { animation-delay: -3s; }
.cl3 { animation-delay: -5s; }
@keyframes float {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-20px); }
}

/* Respeta a quien prefiere menos movimiento */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; }
    .reveal { opacity: 1; transform: none; }
}
@media (max-width: 480px) {
    .card { padding: 44px 24px; }
    h1 { font-size: 26px; }
    .stat-num { font-size: 24px; }
    .btn-iniciar { padding: 14px 40px; font-size: 16px; }
}
</style>
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Orbes de luz -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Floating chart decorations -->
<div class="chart-line cl1">
<svg viewBox="0 0 280 140" xmlns="http://www.w3.org/2000/svg">
<polyline points="0,120 40,90 80,100 120,50 160,65 200,35 240,45 280,20" stroke="#2d7fd4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="0" cy="120" r="3" fill="#2d7fd4"/><circle cx="40" cy="90" r="3" fill="#2d7fd4"/><circle cx="80" cy="100" r="3" fill="#2d7fd4"/>
<circle cx="120" cy="50" r="3" fill="#2d7fd4"/><circle cx="160" cy="65" r="3" fill="#2d7fd4"/><circle cx="200" cy="35" r="3" fill="#2d7fd4"/>
<circle cx="240" cy="45" r="3" fill="#2d7fd4"/><circle cx="280" cy="20" r="3" fill="#2d7fd4"/>
</svg>
</div>

<div class="chart-line cl2">
<svg viewBox="0 0 320 160" xmlns="http://www.w3.org/2000/svg">
<polyline points="0,140 50,100 100,130 150,70 200,90 250,40 300,50 320,30" stroke="#4a9eff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 4"/>
<rect x="10" y="110" width="30" height="40" rx="2" fill="#2d7fd4" opacity="0.4"/>
<rect x="55" y="80" width="30" height="70" rx="2" fill="#2d7fd4" opacity="0.4"/>
<rect x="100" y="95" width="30" height="55" rx="2" fill="#2d7fd4" opacity="0.4"/>
<rect x="145" y="50" width="30" height="100" rx="2" fill="#2d7fd4" opacity="0.4"/>
<rect x="190" y="70" width="30" height="80" rx="2" fill="#2d7fd4" opacity="0.4"/>
<rect x="235" y="35" width="30" height="115" rx="2" fill="#2d7fd4" opacity="0.4"/>
</svg>
</div>

<div class="chart-line cl3">
<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
<circle cx="30" cy="50" r="15" stroke="#2d7fd4" stroke-width="1.5" fill="none"/>
<circle cx="70" cy="50" r="15" stroke="#2d7fd4" stroke-width="1.5" fill="none"/>
<circle cx="110" cy="50" r="15" stroke="#2d7fd4" stroke-width="1.5" fill="none"/>
<circle cx="150" cy="50" r="15" stroke="#2d7fd4" stroke-width="1.5" fill="none"/>
</svg>
</div>

<!-- Scatter dots -->
<div class="dots" id="dots"></div>

<!-- Main card -->
<div class="card">
    <div class="logo-uni reveal d1">
        <img src="imagenes/logo/uni.png" alt="Logo UNI">
    </div>
    <div class="badge reveal d2">
        <span class="pulse-dot"></span>
        Facultad de Ingeniería Industrial
    </div>
    <h1 class="reveal d3">Control Estadístico</h1>
    <p class="subtitle reveal d3">Examen PC4 &mdash; Análisis en Excel y Minitab</p>

    <div class="stats reveal d4">
        <div class="stat">
            <span class="stat-num" data-target="2">0</span>
            <span class="stat-label">Herramientas</span>
        </div>
        <div class="stat">
            <span class="stat-num" data-target="6">0</span>
            <span class="stat-label">Problemas</span>
        </div>
        <div class="stat">
            <span class="stat-num" data-target="12">0</span>
            <span class="stat-label">Análisis</span>
        </div>
    </div>

    <a class="btn-iniciar reveal d5" href="problema1.html">
        Iniciar
        <span class="arrow"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></span>
    </a>
    <p class="footer-text reveal d6">Universidad Nacional de Ingeniería</p>
</div>

<script>
// Generate random scatter dots
(function() {
    var container = document.getElementById('dots');
    var html = '';
    for (var i = 0; i < 40; i++) {
        var x = Math.random() * 100;
        var y = Math.random() * 100;
        var size = 2 + Math.random() * 3;
        var delay = Math.random() * 3;
        html += '<div class="dot" style="left:' + x + '%;top:' + y + '%;width:' + size + 'px;height:' + size + 'px;animation:pulse ' + (2 + Math.random() * 2) + 's ease-in-out ' + delay + 's infinite alternate"></div>';
    }
    container.innerHTML = html;
})();

// Números que cuentan (inspirado en animated-number de Cult UI)
(function() {
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }
    function animateCount(el) {
        var target = parseInt(el.getAttribute('data-target'), 10) || 0;
        var suffix = el.getAttribute('data-suffix') || '';
        if (reduceMotion) { el.textContent = target + suffix; return; }
        var duration = 1400, start = null;
        function step(ts) {
            if (!start) start = ts;
            var p = Math.min((ts - start) / duration, 1);
            el.textContent = Math.round(easeOutExpo(p) * target) + suffix;
            if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }
    // Arranca tras la animación de entrada de las estadísticas
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.querySelectorAll('.stat-num').forEach(animateCount);
        }, 650);
    });
})();
</script>

</body>
</html>
